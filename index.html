<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel = "stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <title>Username Generator</title>
</head>
<body>
   <div class="container">
    <div class="title">
      <h1>UName</h1>
      <p>username generator</p>
    </div>
    <div class="input-field">
      <div class="style">
        <label for="style">Style:</label>
        <button id="style" class="dropdown">cool</button>
        <button id="style" class="dropdown">gamer</button>
        <button id="style" class="dropdown">dev</button>
        <button id="style" class="dropdown">aesthetic</button>
        <button id="style" class="dropdown">dark</button>
        <button id="style" class="dropdown">random</button>
      </div>
      <div class="options">
        <span>Options:</span>
        <div class="option-item">
          <input type="checkbox" id="option-numbers" name="options" value="numbers">
          <label for="option-numbers">numbers</label>
        </div>
        <div class="option-item">
          <input type="checkbox" id="option-underscore" name="options" value="underscore">
          <label for="option-underscore">underscore</label>
        </div>
        <div class="option-item">
          <input type="checkbox" id="option-symbols" name="options" value="symbols">
          <label for="option-symbols">symbols</label>
        </div>
        <div class="option-item">
          <input type="checkbox" id="option-camelcase" name="options" value="camelcase">
          <label for="option-camelcase">camelcase</label>
        </div>
        <div class="option-item">
          <input type="checkbox" id="option-dots" name="options" value="dots">
          <label for="option-dots">dots</label>
        </div>
      </div>
      <div class="count">
        <label for="username-count">Count:</label>
        <input type="range" id="username-count" name="count" min="1" max="20" value="8" oninput="document.getElementById('count-value').textContent = this.value">
        <span id="count-value">8</span>
      </div>
      <div class="button">
        <button onclick="generateUsernames()">Generate</button>
      </div>
    </div>
    <div class="result">
      <div class="title">
        <label for="results">Results:</label>
      </div>
      <div class="output">
        <p>Hit Generate to create usernames
          <span class="material-symbols-outlined">
            arrow_forward
          </span>
        </p>
        <div class="o1">
          <p></p>
          <div class="copy">
            <span class="material-symbols-outlined">favorite</span>
            <button onclick="copyUsername('o1')">Copy</button>
          </div>
          <div class="copy">
            <span class="material-symbols-outlined">favorite</span>
            <button onclick="copyUsername('o1')">Copy</button>
          </div>
          <div class="copy">
            <span class="material-symbols-outlined">favorite</span>
            <button onclick="copyUsername('o1')">Copy</button>
          </div>
           <div class="copy">
            <span class="material-symbols-outlined">favorite</span>
            <button onclick="copyUsername('o1')">Copy</button>
          </div>
        </div>
      </div>
    </div>
   </div>
  <script src = "script.js"></script>
</body>
</html>
