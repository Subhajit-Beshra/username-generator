<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel = "stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <title>Username Generator</title>
</head>
<body>
   <div class="container">
    <div class="title-1">
      <h1>UNAME</h1>
      <p>username generator</p>
    </div>
    <div class="input-field">
      <div class="style">
        <label for="style">STYLE:</label>
        <button class="dropdown" data-style="anime">anime</button>
        <button class="dropdown" data-style="gamer">gamer</button>
        <button class="dropdown" data-style="dev">dev</button>
        <button class="dropdown" data-style="aesthetic">aesthetic</button>
        <button class="dropdown" data-style="dark">dark</button>
        <button class="dropdown" data-style="random">random</button>
      </div>
      <div class="options">
        <span>OPTIONS:</span>
        <div class="option-item">
          <input type="checkbox" id="option-numbers" name="options" value="numbers">
          <label for="option-numbers">numbers</label>
        </div>
        <div class="option-item">
          <input type="checkbox" id="option-underscore" name="options" value="underscore">
          <label for="option-underscore">underscore</label>
        </div>
        <div class="option-item">
          <input type="checkbox" id="option-symbols" name="options" value="symbols">
          <label for="option-symbols">symbols</label>
        </div>
      <div class="count">
        <label for="countSlider">COUNT:</label>
        <input type="range" id="countSlider" min="1" max="20" value="8">
        <span id="count-value">8</span>
      </div>
      <div class="button">
        <button id = "btn" onclick="generateUsernames()">GENERATE</button>
      </div>
    </div>
    <div class="result">
      <div class="title">
        <label for="results">RESULTS:</label>
      </div>
      <div class="output">
        <div class="title-2" style="display: block;">
          <p>HIT THE GENERATE BUTTON TO GET USERNAME
          </p>
        </div>
        <div class="loader" style="display: none;"></div>
        <div class="output-results" style = "display: none;">
          <div class = "output-results-item" id = "item1">
            <p></p>
            <div class="copy">
              <span class="material-symbols-outlined">favorite</span>
              <button onclick="copyUsername('item1')">Copy</button>
            </div>
          </div>
          <div class = "output-results-item" id = "item2">
            <p></p>
            <div class="copy">
              <span class="material-symbols-outlined">favorite</span>
              <button onclick="copyUsername('item2')">Copy</button>
            </div>
          </div>
          <div class = "output-results-item" id = "item3">
            <p></p>
            <div class="copy">
              <span class="material-symbols-outlined">favorite</span>
              <button onclick="copyUsername('item3')">Copy</button>
            </div>
          </div>
          <div class = "output-results-item" id = "item4">
            <p></p>
            <div class="copy">
              <span class="material-symbols-outlined">favorite</span>
              <button onclick="copyUsername('item4')">Copy</button>
            </div>
          </div>
        </div>
      </div>
    </div>
   </div>
  <script src = "script.js"></script>
</body>
</html>
